services:
  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    ports:
      - "32888:80"
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - CORS_ORIGIN=http://localhost:32888
      - ADMIN_INITIAL_PASSWORD=admin
      - LOG_LEVEL=info
    volumes:
      - gridfinity-data:/config
      - gridfinity-data-files:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/v1/health').then(r => { if (!r.ok) process.exit(1) })"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  gridfinity-data:
  gridfinity-data-files:
