services:
  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    ports:
      - "${ORDINUS_PORT:-3001}:80"
    environment:
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3001}
      - LOG_LEVEL=info
      - THEMIS_URL=${THEMIS_URL:-}
    volumes:
      - gridfinity-data:/config
      - gridfinity-data-files:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/api/v1/health').then(r => { if (!r.ok) process.exit(1) })"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  gridfinity-data:
  gridfinity-data-files:
